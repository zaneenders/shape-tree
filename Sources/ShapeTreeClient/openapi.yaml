openapi: "3.0.3"
info:
  title: ShapeTree
  description: Hummingbird server wrapping ScribeAgent.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development server.

paths:

  /sessions:
    post:
      operationId: createSession
      summary: Create a new agent session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "200":
          description: Session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "400":
          description: Invalid request (e.g. bad serverURL).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

  /sessions/{id}/completions:
    post:
      operationId: runCompletion
      summary: Run one completion turn for a session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Completion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
        "400":
          description: Invalid or missing session id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

components:
  schemas:

    CreateSessionRequest:
      type: object
      required:
        - model
        - serverURL
        - systemPrompt
      properties:
        model:
          type: string
          description: Model identifier (e.g. "gemma4:e2b").
        serverURL:
          type: string
          format: uri
          description: OpenAI-compatible server URL (http or https).
        systemPrompt:
          type: string
          description: System prompt for the agent.
        bearerToken:
          type: string
          nullable: true
          description: Optional bearer token for authentication.
        contextWindow:
          type: integer
          nullable: true
          description: Context window size in tokens (default 131072).
        contextWindowThreshold:
          type: number
          format: double
          nullable: true
          description: Threshold fraction for context window management (default 0.85).

    CreateSessionResponse:
      type: object
      required:
        - id
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    CompletionRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: The user message to send to the agent.

    CompletionResponse:
      type: object
      required:
        - assistant
      properties:
        assistant:
          type: string
          description: The assistant's reply text.

    HTTPErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
          properties:
            message:
              type: string
