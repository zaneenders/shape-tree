services:
  api:
    build:
      context: .
      dockerfile: apps/shape-tree-api/Dockerfile
      args:
        # Overridden by scripts/docker-build.sh, which auto-detects the host arch.
        # Defaults target arm64 (aarch64) so `docker compose up --build` works on
        # Apple Silicon. Pass x86_64-swift-linux-musl paths for Intel hosts.
        API_BINARY_PATH: apps/shape-tree-api/.build/aarch64-swift-linux-musl/release/ShapeTree
    env_file:
      - apps/shape-tree-api/.env.example
    environment:
      OTEL_EXPORTER_OTLP_BASE_ENDPOINT: http://jaeger:4318
    volumes:
      - ./apps/shape-tree-api/:/data
    ports:
      - "127.0.0.1:42067:42067"
      - "127.0.0.1:42068:42068"
    restart: unless-stopped
    depends_on:
      - jaeger
    networks:
      - app
      - observability

  web:
    build:
      context: .
      dockerfile: apps/shape-tree-web/Dockerfile
      args:
        WEB_BINARY_PATH: apps/shape-tree-web/.build/aarch64-swift-linux-musl/release/ShapeTreeWeb
        WEB_RESOURCES_PATH: apps/shape-tree-web/.build/aarch64-swift-linux-musl/release/shape-tree-web_ShapeTreeWebAssets.resources
    env_file:
      - apps/shape-tree-web/.env.example
    environment:
      OTEL_EXPORTER_OTLP_BASE_ENDPOINT: http://jaeger:4318
    volumes:
      - ./apps/shape-tree-web/Examples:/Examples:ro
    ports:
      - "127.0.0.1:42069:42069"
      - "127.0.0.1:42070:42070"
    restart: unless-stopped
    depends_on:
      - jaeger
    networks:
      - app
      - observability

  jaeger:
    image: jaegertracing/jaeger:2.4.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      - web
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - jaeger
    networks:
      - observability

volumes:
  shape_tree_data:

networks:
  app:
  observability:
