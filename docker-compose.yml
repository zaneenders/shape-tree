include:
  - ./observability/docker-compose.yml

services:
  api:
    build:
      context: apps/shape-tree-api
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIG:-release}
    env_file:
      - path: apps/shape-tree-api/.env
        required: false
    environment:
      # All defaults baked into apps/shape-tree-api/Dockerfile; override via
      # the environment: block here, or by mounting a .env in tower compose.
      DATA_PATH: /data
      OTEL_EXPORTER_OTLP_BASE_ENDPOINT: http://jaeger:4318
    volumes:
      - ./apps/shape-tree-api/:/data
    ports:
      - "127.0.0.1:42067:42067"
      - "127.0.0.1:42068:42068"
    restart: unless-stopped
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - app
      - observability

  web:
    build:
      context: apps/shape-tree-web
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIG:-release}
    env_file:
      - path: apps/shape-tree-web/.env
        required: false
    environment:
      HOSTNAME: 0.0.0.0
      STATIC_ROOT: /app/dist
      SKIP_SHAPE_TREE_WEB_BUILD: "1"
      SITE_URL: http://127.0.0.1:42069
      OTEL_EXPORTER_OTLP_BASE_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: "false"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: shape_tree
      PGPASSWORD: shape_tree
      PGDATABASE: shape_tree
      PGSSLMODE: disable
      CONTENT_PATH: /content
    volumes:
      - ${HOME}/content:/content:ro
    ports:
      - "127.0.0.1:42069:8080"
      - "127.0.0.1:42070:42070"
    restart: unless-stopped
    depends_on:
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app
      - observability

  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: shape_tree
      POSTGRES_PASSWORD: shape_tree
      POSTGRES_DB: shape_tree
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - shape_tree_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shape_tree"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app

networks:
  app:

volumes:
  shape_tree_data:
