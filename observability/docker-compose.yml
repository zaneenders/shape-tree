services:
  jaeger:
    image: jaegertracing/jaeger:2.19.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - observability

  parca:
    image: ghcr.io/ordo-one/swift-parca:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:7070:7070"
    volumes:
      - parca-data:/data
    command:
      - "--symbolizer-external-addr-2-line-path=/usr/local/bin/addr2line-swift"
      - "--enable-persistence"
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v3.12.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - observability

  grafana:
    image: grafana/grafana:13.0.3
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GRAFANA_PARCA_URL=http://parca:7070
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger
      - parca
    networks:
      - observability

networks:
  observability:

volumes:
  parca-data:

