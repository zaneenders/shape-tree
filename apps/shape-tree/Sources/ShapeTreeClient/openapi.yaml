openapi: "3.0.3"
info:
  title: ShapeTree
  description: Hummingbird server wrapping ScribeAgent.
  version: 0.1.0

servers:
  - url: http://localhost:42069
    description: Local development server.

security:
  - bearerAuth: []

paths:

  /journal/subjects:
    get:
      operationId: listJournalSubjects
      summary: List configured journal subjects.
      responses:
        "200":
          description: Subject catalogue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalSubjectsResponse"
        "500":
          description: Server failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
    post:
      operationId: appendJournalSubject
      summary: Add a journal subject (idempotent when the label already exists).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalSubjectAppendRequest"
      responses:
        "200":
          description: Full catalogue after applying the append.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalSubjectsResponse"
        "400":
          description: Empty or invalid label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "500":
          description: Server failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

  /journal/entries:
    get:
      operationId: listJournalEntrySummaries
      summary: List journal entry metadata for each day in the date span that has a Markdown file.
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            pattern: '^[0-9]{2}-[0-9]{2}-[0-9]{2}$'
          description: Inclusive range start (`yy-MM-dd`).
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            pattern: '^[0-9]{2}-[0-9]{2}-[0-9]{2}$'
          description: Inclusive range end (`yy-MM-dd`).
      responses:
        "200":
          description: Summaries for days that have an entry file on disk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntriesSummariesResponse"
        "400":
          description: Invalid or malformed query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "500":
          description: Server failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
    post:
      operationId: appendJournalEntry
      summary: Append a markdown journal block (git-managed).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppendJournalEntryRequest"
      responses:
        "201":
          description: Entry persisted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppendJournalEntryResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "500":
          description: Server failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

  /journal/entries/{journal_day}:
    get:
      operationId: getJournalEntryDetail
      summary: Load Markdown journal content for a single calendar day.
      parameters:
        - name: journal_day
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9]{2}-[0-9]{2}-[0-9]{2}$'
          description: Calendar day key `yy-MM-dd`.
      responses:
        "200":
          description: Entry body found on disk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntryDetailResponse"
        "404":
          description: No Markdown file for this day.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "400":
          description: Invalid path parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "500":
          description: Server failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

  /devices/register-token:
    post:
      operationId: registerDeviceToken
      summary: Persist an APNs device token alongside optional device metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceTokenRegistrationRequest"
      responses:
        "200":
          description: Stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceTokenRegistrationResponse"
        "400":
          description: Invalid token payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "500":
          description: Server failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

  /sessions:
    post:
      operationId: createSession
      summary: Create a new agent session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "200":
          description: Session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

  /sessions/{id}/completions:
    post:
      operationId: runCompletion
      summary: Run one completion turn for a session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Completion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
        "400":
          description: Invalid or missing session id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

  /sessions/{id}/completions/stream:
    post:
      operationId: runCompletionStream
      summary: >-
        Stream one completion turn for a session using JSON Lines
        (`application/jsonl`), mirroring Scribe `TurnStream.events` followed by a
        terminal `done` event.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Stream of CompletionStreamEvent lines (JSON Lines).
          content:
            application/jsonl:
              schema:
                $ref: "#/components/schemas/CompletionStreamEvent"
        "400":
          description: Invalid or missing session id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:

    JournalSubject:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
          description: Stable subject identifier used when creating entries.
        label:
          type: string
          description: Heading label shown in Markdown blocks.

    JournalSubjectsResponse:
      type: object
      required:
        - subjects
      properties:
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/JournalSubject"

    JournalSubjectAppendRequest:
      type: object
      required:
        - subject
      properties:
        subject:
          type: string
          description: >-
            Display label for the subject (whitespace trimmed on the server); a stable id is assigned if new.

    JournalEntrySummary:
      type: object
      required:
        - date
        - journal_relative_path
        - word_count
        - line_count
      properties:
        date:
          type: string
          description: Calendar day key (`yy-MM-dd`).
        journal_relative_path:
          type: string
          description: Repo-relative Markdown path (`yy/MM/yy-MM-dd.md`).
        word_count:
          type: integer
          minimum: 0
        line_count:
          type: integer
          minimum: 0

    JournalEntriesSummariesResponse:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/JournalEntrySummary"

    JournalEntryDetailResponse:
      type: object
      required:
        - date
        - journal_relative_path
        - content
        - word_count
        - line_count
      properties:
        date:
          type: string
        journal_relative_path:
          type: string
        content:
          type: string
        word_count:
          type: integer
          minimum: 0
        line_count:
          type: integer
          minimum: 0

    AppendJournalEntryRequest:
      type: object
      required:
        - subject_ids
        - body
      properties:
        subject_ids:
          type: array
          items:
            type: string
          description: Subject ids to render as `# label1, label2`.
        body:
          type: string
          description: Markdown body for this block (`# headings`… are added by the server).
        journal_day:
          type: string
          pattern: '^[0-9]{2}-[0-9]{2}-[0-9]{2}$'
          description: >-
            Calendar day key (`yy-MM-dd`) for the client's local civil day that should receive this block
            (recommended; when omitted the server derives the path from `created_at` using UTC components).
        created_at:
          type: string
          format: date-time
          description: Optional anchor instant; not written into Markdown. When `journal_day` is omitted, filepath derives from this instant (UTC civil date).

    AppendJournalEntryResponse:
      type: object
      required:
        - journal_relative_path
      properties:
        journal_relative_path:
          type: string
          description: Repo-relative Markdown path (`yy/MM/yy-MM-dd.md`) under `.shape-tree/Journal`.

    DeviceTokenRegistrationRequest:
      type: object
      required:
        - device_token
      properties:
        device_token:
          type: string
          description: APNs device token string.
        device_id:
          type: string
          description: Optional stable client id for the on-disk JSON filename.

    DeviceTokenRegistrationResponse:
      type: object
      required:
        - stored
      properties:
        stored:
          type: boolean

    CreateSessionRequest:
      type: object
      properties:
        systemPrompt:
          type: string
          description: Optional system prompt override for the agent.

    CreateSessionResponse:
      type: object
      required:
        - id
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    CompletionRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: The user message to send to the agent.

    CompletionResponse:
      type: object
      required:
        - assistant
      properties:
        assistant:
          type: string
          description: The assistant's reply text.

    CompletionStreamSection:
      type: string
      enum:
        - reasoning
        - answer

    CompletionStreamOutcome:
      type: string
      enum:
        - completed
        - interrupted
        - tool_round_limit

    CompletionStreamEvent:
      type: object
      description: >-
        One JSON Lines record. Maps from Scribe `TranscriptEvent` while the turn
        runs; always ends with `kind: done` on success paths.
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - section_enter
            - assistant_delta
            - finalize_assistant
            - empty_turn
            - blank_line
            - usage
            - tool_round
            - tool_invocation
            - skipped_line
            - harness_error
            - turn_interrupted
            - model_running
            - done
        stream_section:
          $ref: "#/components/schemas/CompletionStreamSection"
        previous_stream_section:
          $ref: "#/components/schemas/CompletionStreamSection"
        text:
          type: string
          description: Delta for `assistant_delta` or human-readable tool output preview.
        round:
          type: integer
          minimum: 0
        tool_names:
          type: array
          items:
            type: string
        tool_name:
          type: string
        tool_arguments:
          type: string
        tool_output:
          type: string
        prompt_tokens:
          type: integer
          minimum: 0
        completion_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
        tokens_per_second:
          type: number
        harness_error_message:
          type: string
        model_running:
          type: boolean
        outcome:
          $ref: "#/components/schemas/CompletionStreamOutcome"
        tool_round_limit_rounds:
          type: integer
          minimum: 0
        assistant_full_text:
          type: string
          description: Full assistant message after the turn (only on `done`).

    HTTPErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
          properties:
            message:
              type: string
