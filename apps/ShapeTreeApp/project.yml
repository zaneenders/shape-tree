name: ShapeTreeApp

include:
  - path: project.local.yml

options:
  bundleIdPrefix: shape-tree

packages:
  ShapeTreeClient:
    path: ../shape-tree

targets:
  ShapeTreeApp-iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - ShapeTreeShared
      - ShapeTree-iOS-Only
    resources:
      - ShapeTree-iOS-Only/Assets.xcassets
    entitlements:
      path: ShapeTree-iOS-Only/ShapeTree.entitlements
    settings:
      PRODUCT_NAME: ShapeTree
      PRODUCT_BUNDLE_IDENTIFIER: shape-tree.ShapeTreeApp
      IPHONEOS_DEPLOYMENT_TARGET: "26.0"
      CODE_SIGN_STYLE: Automatic
      ENABLE_PREVIEWS: YES
      SWIFT_VERSION: "6.0"
      SWIFT_STRICT_CONCURRENCY: complete
      SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
      TARGETED_DEVICE_FAMILY: "1,2"
      MARKETING_VERSION: "0.0.0"
      CURRENT_PROJECT_VERSION: "7"
      INFOPLIST_KEY_CFBundleDisplayName: ShapeTree
      INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_FILE: AppTransportSecurity.plist
      GENERATE_ASSET_SYMBOLS: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      DEAD_CODE_STRIPPING: YES
      STRIP_INSTALLED_PRODUCT: YES
      STRIP_STYLE: debugging
    dependencies:
      - package: ShapeTreeClient
        product: ShapeTreeClient

  ShapeTreeApp-Mac:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - ShapeTreeShared
      - ShapeTree-Mac-Only
    resources:
      - ShapeTree-Mac-Only/Assets.xcassets
    settings:
      PRODUCT_NAME: ShapeTree
      PRODUCT_BUNDLE_IDENTIFIER: shape-tree.ShapeTreeApp
      MACOSX_DEPLOYMENT_TARGET: "26.0"
      CODE_SIGN_STYLE: Automatic
      ENABLE_PREVIEWS: YES
      SWIFT_VERSION: "6.0"
      SWIFT_STRICT_CONCURRENCY: complete
      SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
      MARKETING_VERSION: "0.0.0"
      CURRENT_PROJECT_VERSION: "7"
      INFOPLIST_KEY_CFBundleDisplayName: ShapeTree
      INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_FILE: AppTransportSecurity.plist
      DEAD_CODE_STRIPPING: YES
      STRIP_INSTALLED_PRODUCT: YES
      STRIP_STYLE: debugging
    entitlements:
      path: ShapeTree-Mac-Only/ShapeTree.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    dependencies:
      - package: ShapeTreeClient
        product: ShapeTreeClient

schemes:
  ShapeTreeApp-iOS:
    build:
      targets:
        ShapeTreeApp-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  ShapeTreeApp-iOS-Release:
    build:
      targets:
        ShapeTreeApp-iOS: all
    run:
      config: Release
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  ShapeTreeApp-Mac:
    build:
      targets:
        ShapeTreeApp-Mac: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  ShapeTreeApp-Mac-Release:
    build:
      targets:
        ShapeTreeApp-Mac: all
    run:
      config: Release
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
